server:
  port: 8081
  servlet:
    session:
      timeout: 12h
      cookie:
        http-only: true
        secure: false  # 开发环境使用HTTP，生产环境应改为true并启用HTTPS
        same-site: strict

spring:
  application:
    name: 学生选课系统
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/app_stu_select?serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:app_stu_select}
    password: ${DB_PASSWORD:app_stu_select}
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

logging:
  level:
    org.springframework.jdbc.core: info

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
