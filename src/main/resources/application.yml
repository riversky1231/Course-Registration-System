server:
  port: 8081
  servlet:
    session:
      timeout: 12h

spring:
  application:
    name: 学生选课系统
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/app_stu_select?serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:app_stu_select}
    password: ${DB_PASSWORD:app_stu_select}
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  sql:
    init:
      mode: always
      encoding: UTF-8

logging:
  level:
    org.springframework.jdbc.core: info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
